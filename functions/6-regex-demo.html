<!doctype html>
<html>
  <head>
    <title>JavaScript RegExp Object Demo</title>

    <style>
      body {
        font-family: Arial;
        margin: 40px;
      }

      button {
        margin: 5px;
        padding: 8px;
      }

      input {
        padding: 5px;
        margin: 5px;
      }

      #output {
        margin-top: 20px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h2>JavaScript RegExp (Regular Expression) Demonstration</h2>

    <p>
      Enter text below and click the buttons to test different regex functions.
    </p>

    <input type="text" id="userInput" placeholder="Enter text here" />

    <div>
      <button onclick="testRegex()">Test Pattern</button>
      <button onclick="searchRegex()">Search Pattern</button>
      <button onclick="replaceRegex()">Replace Text</button>
      <button onclick="matchRegex()">Match Pattern</button>
      <button onclick="splitRegex()">Split Text</button>
    </div>

    <div id="output">Results will appear here...</div>

    <hr />

    <h3>Indian Context Regex Examples</h3>

    <button onclick="validatePin()">Validate Indian PIN Code</button>
    <button onclick="validatePhone()">Validate Indian Phone Number</button>
    <button onclick="validateVehicle()">Validate Vehicle Number</button>
    <button onclick="validateEmail()">Validate Email</button>

    <script>
      // -----------------------------------
      // 1. test() method
      // Checks whether pattern exists
      // -----------------------------------

      function testRegex() {
        let text = document.getElementById("userInput").value;

        // Pattern to check if word "India" exists
        let pattern = /India/i;

        let result = pattern.test(text);

        document.getElementById("output").innerHTML =
          "Does text contain 'India'? : " + result;
      }

      // -----------------------------------
      // 2. search() method
      // Returns index position of match
      // -----------------------------------

      function searchRegex() {
        let text = document.getElementById("userInput").value;

        let pattern = /Delhi/i;

        let position = text.search(pattern);

        document.getElementById("output").innerHTML =
          "Position of 'Delhi' in text: " + position;
      }

      // -----------------------------------
      // 3. replace() method
      // Replace text using regex
      // -----------------------------------

      function replaceRegex() {
        let text = document.getElementById("userInput").value;

        let pattern = /Mumbai/i;

        let newText = text.replace(pattern, "Bengaluru");

        document.getElementById("output").innerHTML =
          "Updated Text: " + newText;
      }

      // -----------------------------------
      // 4. match() method
      // Returns matched values
      // -----------------------------------

      function matchRegex() {
        let text = document.getElementById("userInput").value;

        // Find all numbers
        let pattern = /\d+/g;

        let result = text.match(pattern);

        document.getElementById("output").innerHTML =
          "Numbers found: " + result;
      }

      // -----------------------------------
      // 5. split() using regex
      // -----------------------------------

      function splitRegex() {
        let text = document.getElementById("userInput").value;

        // Split words by spaces
        let words = text.split(/\s+/);

        document.getElementById("output").innerHTML = "Words: " + words;
      }

      // -----------------------------------
      // Indian Examples
      // -----------------------------------

      // -----------------------------------
      // 6. Validate Indian PIN Code
      // Example: 534202
      // -----------------------------------

      function validatePin() {
        let text = document.getElementById("userInput").value;

        let pattern = /^[1-9][0-9]{5}$/;

        let result = pattern.test(text);

        document.getElementById("output").innerHTML =
          "Valid Indian PIN Code: " + result;
      }

      // -----------------------------------
      // 7. Validate Indian Phone Number
      // Example: 9876543210
      // -----------------------------------

      function validatePhone() {
        let text = document.getElementById("userInput").value;

        let pattern = /^[6-9][0-9]{9}$/;

        let result = pattern.test(text);

        document.getElementById("output").innerHTML =
          "Valid Indian Mobile Number: " + result;
      }

      // -----------------------------------
      // 8. Validate Vehicle Number
      // Example: AP39AB1234
      // -----------------------------------

      function validateVehicle() {
        let text = document.getElementById("userInput").value;

        let pattern = /^[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}$/;

        let result = pattern.test(text);

        document.getElementById("output").innerHTML =
          "Valid Vehicle Number: " + result;
      }

      // -----------------------------------
      // 9. Validate Email
      // -----------------------------------

      function validateEmail() {
        let text = document.getElementById("userInput").value;

        let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        let result = pattern.test(text);

        document.getElementById("output").innerHTML = "Valid Email: " + result;
      }
    </script>
  </body>
</html>
