<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Manipulation Demo</title>

    <style>
      /* Basic styling for clarity */
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .box {
        padding: 10px;
        margin: 10px 0;
        border: 2px solid #333;
      }

      .highlight {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <h1 id="mainTitle">DOM Manipulation Demo</h1>

    <!-- Paragraph with class -->
    <p class="text">This is first paragraph</p>
    <p class="text">This is second paragraph</p>

    <!-- Div with ID -->
    <div id="box1" class="box">Box 1</div>

    <!-- Buttons to trigger actions -->
    <button onclick="changeById()">Change by ID</button>
    <button onclick="changeByClass()">Change by Class</button>
    <button onclick="changeByTag()">Change by Tag</button>
    <button onclick="changeQuerySelector()">Query Selector</button>
    <button onclick="changeBody()">Change Body Style</button>

    <script>
      // -------------------------------
      // 1. SELECT ELEMENT BY ID
      // -------------------------------
      function changeById() {
        // getElementById selects a single element
        let element = document.getElementById("mainTitle");

        // Change text content
        element.innerHTML = "Title Changed using getElementById";

        // Change style
        element.style.color = "blue";
      }

      // -------------------------------
      // 2. SELECT ELEMENTS BY CLASS
      // -------------------------------
      function changeByClass() {
        // getElementsByClassName returns a collection (array-like)
        let elements = document.getElementsByClassName("text");

        // Loop through all elements
        for (let i = 0; i < elements.length; i++) {
          elements[i].style.color = "green";
          elements[i].innerHTML = "Updated using Class Selector";
        }
      }

      // -------------------------------
      // 3. SELECT ELEMENTS BY TAG NAME
      // -------------------------------
      function changeByTag() {
        // Select all paragraph tags
        let elements = document.getElementsByTagName("p");

        for (let i = 0; i < elements.length; i++) {
          elements[i].style.fontWeight = "bold";
        }
      }

      // -------------------------------
      // 4. QUERY SELECTOR (CSS STYLE)
      // -------------------------------
      function changeQuerySelector() {
        // Select first element using CSS selector
        let element = document.querySelector("#box1");

        // Add class dynamically
        element.classList.add("highlight");

        // Change content
        element.innerHTML = "Styled using querySelector";
      }

      // -------------------------------
      // 5. CHANGE BODY STYLE
      // -------------------------------
      function changeBody() {
        // Access body directly
        document.body.style.backgroundColor = "#f0f8ff";

        // Change font style
        document.body.style.fontFamily = "Courier New";
      }

      // -------------------------------
      // EXTRA: DOM EVENT EXAMPLE
      // -------------------------------
      // This runs automatically when page loads
      window.onload = function () {
        console.log("Page Loaded Successfully");
      };
    </script>
  </body>
</html>
